<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap');

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #fdfdfd;
  }

  .irr-vis {
    font-family: 'SUIT', sans-serif;
    width: 100%;
    height: 100%;
    background: #fdfdfd;
    border: 1px solid #e8e8e8;
    border-radius: 4px;
    padding: 12px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .irr-vis .canvas-wrap {
    flex: 1;
    min-height: 0;
    position: relative;
  }
  .irr-vis canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
    background: #404040;
    touch-action: none;
  }
  .irr-vis canvas:active { cursor: grabbing; }
  .irr-vis .controls {
    padding: 4px;
    display: grid;
    grid-template-columns: 88px 1fr 72px;
    align-items: center;
    gap: 12px 12px;
    flex-shrink: 0;
  }
  .irr-vis .label { font-size: 15px; color: #444; }
  .irr-vis .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: #2052BB;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .irr-vis input[type=color] {
    width: 100%;
    height: 22px;
    padding: 0;
    border: 1px solid #d4d4d8;
    border-radius: 4px;
    background: none;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="irr-vis">
  <div class="canvas-wrap">
    <canvas id="irrCanvas"></canvas>
  </div>
  <div class="controls">
    <div class="label">Diffuse</div>
    <input type="color" id="cPicker" value="#ffffff">
    <div class="value" id="cVal">#FFFFFF</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
/*
 * Diffuse IBL irradiance 큐브맵을 구체에 셰이딩하고, 원본 환경 큐브맵을 배경(스카이박스)으로
 * 깔아 직접 비교하는 위젯. (흐릿한 irradiance 구체 vs 선명한 원본 라디언스)
 * 씬 스캐폴딩/UI는 BRDF(pbr-vis) 시각화 포맷을 따른다: XY평면 그리드 + Z축 선 + 라이트 프레임.
 *
 * 셰이딩: 표면 노멀 N으로 irradiance 큐브맵을 한 번 샘플 -> diffuseColor 를 곱한 게 결과.
 *
 * 좌표계: 씬은 Unreal(X forward, Y right, Z up)로 배치. 큐브맵 파일명이 UE축과 일치하므로
 *   Xp=+X(앞), Xm=-X(뒤), Yp=+Y(오른), Ym=-Y(왼), Zp=+Z(위), Zm=-Z(아래).
 *   (면 순서 [+X,-X,+Y,-Y,+Z,-Z] 에 같은 글자 면을 로드 → UE 방향으로 그대로 샘플)
 * 단 Three.js는 우수좌표계, 소스는 좌수좌표계라 핸드니스가 달라 Y축만 반전한다:
 *   dir = (v.x, -v.y, v.z)  // 위/아래(Z)·앞/뒤(X)는 그대로, 좌우(Y)만 반전. 구체/배경 공용.
 * 텍스처는 HDR(.hdr) 선형값 → 표시 시 감마 2.2로 인코딩(고정), 노출 1.0(고정).
 */
import * as THREE from 'three';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

const PI = Math.PI;
const GAMMA = 2.2;            // 저장값이 어두워 밝게 보정 (고정)
const BASE_FOV = 40 * PI / 180;
const CAM_DIST = 4.2;
const GRID_C   = 0xe3e3e6;
const GRID_MID = 0xd0d0d4;
const AXIS_C   = 0x8a93a6;

const canvas = document.getElementById('irrCanvas');
const cPicker = document.getElementById('cPicker');
const cValEl = document.getElementById('cVal');

// ---- renderer / scene / camera ----
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setClearColor(0x404040, 1);
renderer.toneMapping = THREE.NoToneMapping;
renderer.outputColorSpace = THREE.LinearSRGBColorSpace;   // 자동 sRGB 인코딩 끔(감마 수동 처리)

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 1000);
camera.up.set(0, 0, 1);   // Z-up (Unreal)

// ---- 배경 = 원본 환경 큐브맵 (1024² gamma PNG, LDR) ----
// 배경은 장식용이라 정밀도 불필요 → LDR. PNG 는 gamma 공간으로 저장(=표시값)이라
// 스카이박스 셰이더는 raw 출력(런타임 감마 없음). 면 순서 = [+X,-X,+Y,-Y,+Z,-Z].
const envTex = new THREE.CubeTextureLoader()
  .setPath('./Cubemap/')
  .load(['Xp.png', 'Xm.png', 'Yp.png', 'Ym.png', 'Zp.png', 'Zm.png'], () => render());
envTex.colorSpace = THREE.LinearSRGBColorSpace;   // 저장값 그대로 (sRGB 디코딩 X)
envTex.flipY = false;

// ---- 구체 = irradiance 큐브맵 (HDR) ----
// .hdr(RGBE) 6면 → half-float CubeTexture. 값 양자화/밴딩 없음. 데이터 텍스처는 flipY
// 미적용이나 RGBE 스캔라인 순서가 PNG(flipY=false)와 동일(행0=위)이라 cubeDir 규칙 유지.
const rgbeLoader = new RGBELoader().setDataType(THREE.HalfFloatType);
const IRR_FACES = ['Xp_0.hdr', 'Xm_0.hdr', 'Yp_0.hdr', 'Ym_0.hdr', 'Zp_0.hdr', 'Zm_0.hdr'];

Promise.all(IRR_FACES.map(f => rgbeLoader.loadAsync('./Irradiance/' + f)))
  .then((texs) => {
    // DataTexture 객체 6개를 그대로 전달 → Three 가 image[i].isDataTexture 를 보고
    // 데이터 업로드 경로를 탄다 (image 만 넘기면 DOM용 texSubImage2D 오버로드로 실패).
    const cube = new THREE.CubeTexture(texs);
    cube.type = THREE.HalfFloatType;
    cube.format = THREE.RGBAFormat;
    cube.colorSpace = THREE.LinearSRGBColorSpace;
    cube.minFilter = THREE.LinearFilter;
    cube.magFilter = THREE.LinearFilter;
    cube.generateMipmaps = false;
    cube.needsUpdate = true;
    sphereMat.uniforms.uIrradiance.value = cube;
    render();
  })
  .catch((err) => console.error('HDR irradiance load failed:', err));

// 공용 좌표 변환(UE축 재배치 + Y반전) + 감마. 좌우/앞뒤 뒤집혀 보이면 여기 한 곳만 조정.
const CUBE_GLSL = `
  vec3 cubeDir(vec3 v) { return vec3(v.x, -v.y, v.z); }   // UE축 그대로 + 좌우(Y) 반전(LH<->RH)
  vec3 gammaEnc(vec3 c) { return pow(max(c, 0.0), vec3(1.0 / ${GAMMA.toFixed(4)})); }
`;

// ---- 배경 스카이박스 (원본 환경맵) ----
const skyMat = new THREE.ShaderMaterial({
  uniforms: { uEnv: { value: envTex } },   // gamma PNG (저장값 = 표시값)
  side: THREE.BackSide,
  depthWrite: false,
  vertexShader: `
    varying vec3 vWorldPos;
    void main() {
      vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    precision highp float;
    uniform samplerCube uEnv;
    varying vec3 vWorldPos;
    ${CUBE_GLSL}
    void main() {
      vec3 d = normalize(vWorldPos - cameraPosition);
      gl_FragColor = vec4(textureCube(uEnv, cubeDir(d)).rgb, 1.0);   // gamma PNG = raw 출력
    }
  `,
});
const sky = new THREE.Mesh(new THREE.BoxGeometry(200, 200, 200), skyMat);
sky.frustumCulled = false;
sky.renderOrder = -1;
scene.add(sky);

// ---- irradiance 구체 ----
const sphereMat = new THREE.ShaderMaterial({
  uniforms: {
    uIrradiance: { value: null },   // HDR 큐브맵 로드 완료 시 주입
    uDiffuseColor: { value: new THREE.Color(1, 1, 1) },
  },
  vertexShader: `
    varying vec3 vN;
    void main() {
      vN = normalize(mat3(modelMatrix) * normal);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    precision highp float;
    uniform samplerCube uIrradiance;
    uniform vec3 uDiffuseColor;
    varying vec3 vN;
    ${CUBE_GLSL}
    void main() {
      vec3 irr = textureCube(uIrradiance, cubeDir(normalize(vN))).rgb;
      gl_FragColor = vec4(gammaEnc(irr * uDiffuseColor), 1.0);
    }
  `,
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1, 96, 64), sphereMat));

// ---- 바닥 격자 (x-y 평면, z=0) + z축 선: UE 좌표 기준 방향 표시 ----
const grid = new THREE.GridHelper(4, 8, GRID_MID, GRID_C);
grid.rotation.x = PI / 2;
scene.add(grid);
scene.add(new THREE.Line(
  new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, 1.5),
  ]),
  new THREE.LineBasicMaterial({ color: AXIS_C })
));

// ---- 카메라 (구면 좌표: azimuth + elevation) ----
let orbitAz = 0.6;
let orbitEl = 0.35;
const EL_MAX = 1.45, EL_MIN = -1.45;   // 위/아래 모두 (극점 직전까지; 그리드가 방향 기준)
function updateCamera() {
  const ce = Math.cos(orbitEl), se = Math.sin(orbitEl);
  camera.position.set(
    CAM_DIST * ce * Math.cos(orbitAz),
    CAM_DIST * ce * Math.sin(orbitAz),
    CAM_DIST * se
  );
  camera.lookAt(0, 0, 0);
}

function render() {
  updateCamera();
  renderer.render(scene, camera);
}

// ---- Diffuse Color 컬러피커 ----
function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [((n >> 16) & 255) / 255, ((n >> 8) & 255) / 255, (n & 255) / 255];
}
cPicker.addEventListener('input', () => {
  const [r, g, b] = hexToRgb(cPicker.value);
  sphereMat.uniforms.uDiffuseColor.value.setRGB(r, g, b);
  cValEl.textContent = cPicker.value.toUpperCase();
  render();
});

// ---- 적응형 FOV resize ----
function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (w === 0 || h === 0) return;
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(w, h, false);
  const aspect = w / h;
  camera.aspect = aspect;
  const vfov = aspect >= 1 ? BASE_FOV : 2 * Math.atan(Math.tan(BASE_FOV / 2) / aspect);
  camera.fov = vfov * 180 / PI;
  camera.updateProjectionMatrix();
  render();
}

// ---- 상시 rAF 루프: 드래그 / 2축 관성 / 유휴 시 azimuth 자동회전 (BRDF 시각화와 동일) ----
const DAMP      = 10;     // 관성 감쇠 (클수록 빨리 멈춤)
const VEL_MIN   = 0.15;   // 이 속도 이하 → 관성 종료
const idleDelay = 3.0;    // 입력 없을 때 자동회전 재시작까지 (초)
const rotSpeed  = 0.25;   // 자동회전 목표 속도 (rad/s)
const RAMP_TIME = 1.5;    // 목표 속도까지 가속 시간 (초)

let dragging = false, prevX = 0, prevY = 0, lastMoveT = 0;
let vAz = 0, vEl = 0;          // 드래그 관성 각속도 (2축)
let lastInput = -Infinity;     // 시작 시 바로 자동회전
let ramp = 0;                  // 자동회전 가속 램프 (0~1)
let prevT = performance.now();

function tick(now) {
  const dt = Math.min((now - prevT) / 1000, 0.1);
  prevT = now;
  if (dragging) {
    lastInput = now;
    ramp = 0;
  } else if (Math.abs(vAz) > VEL_MIN || Math.abs(vEl) > VEL_MIN) {
    // 2축 관성: 감쇠하며 회전, 도는 동안 idle 타이머 정지
    orbitAz += vAz * dt;
    const newEl = orbitEl + vEl * dt;
    if (newEl <= EL_MIN)      { orbitEl = EL_MIN; vEl = 0; }   // 클램프에 닿으면 축 속도 정지
    else if (newEl >= EL_MAX) { orbitEl = EL_MAX; vEl = 0; }
    else                      { orbitEl = newEl; }
    vAz *= Math.exp(-dt * DAMP);
    vEl *= Math.exp(-dt * DAMP);
    if (Math.abs(vAz) <= VEL_MIN) vAz = 0;
    if (Math.abs(vEl) <= VEL_MIN) vEl = 0;
    ramp = 0;
    lastInput = now;   // 회전이 멈추는 이 시점부터 idle 타이머 시작
    render();
  } else if ((now - lastInput) / 1000 >= idleDelay) {
    ramp = Math.min(ramp + dt / RAMP_TIME, 1);
    const eased = ramp * ramp * (3 - 2 * ramp);   // smoothstep 가속
    orbitAz -= rotSpeed * eased * dt;
    render();
  } else {
    ramp = 0;   // 멈추면 다음 회전은 다시 천천히 시작
  }
  requestAnimationFrame(tick);
}

canvas.addEventListener('pointerdown', (e) => {
  dragging = true;
  vAz = 0; vEl = 0;          // 새 드래그 → 진행 중 관성 즉시 중단
  prevX = e.clientX; prevY = e.clientY;
  lastMoveT = performance.now();
  lastInput = lastMoveT;
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  const mt = performance.now();
  const dtMove = Math.max((mt - lastMoveT) / 1000, 1e-3);
  const dAz = -(e.clientX - prevX) * 0.008;
  const newEl = orbitEl + (e.clientY - prevY) * 0.008;
  const clampedEl = Math.max(EL_MIN, Math.min(EL_MAX, newEl));
  const dEl = clampedEl - orbitEl;   // 클램프 후 실제 이동량 (관성 누적 방지)
  orbitAz += dAz;
  orbitEl = clampedEl;
  vAz = dAz / dtMove;
  vEl = dEl / dtMove;
  prevX = e.clientX; prevY = e.clientY;
  lastMoveT = mt;
  lastInput = mt;
  render();
});
const endDrag = () => {
  if (!dragging) return;
  dragging = false;
  if (performance.now() - lastMoveT > 100) { vAz = 0; vEl = 0; }   // 멈춘 채 놓으면 관성 없음
};
canvas.addEventListener('pointerup', endDrag);
canvas.addEventListener('pointerleave', endDrag);

window.addEventListener('resize', resize);
if (window.ResizeObserver) new ResizeObserver(resize).observe(canvas);

// ---- init ----
resize();
requestAnimationFrame(tick);
</script>

</body>
</html>
