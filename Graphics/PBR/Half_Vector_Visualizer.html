<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap');

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #fdfdfd;
  }

  .hv-vis {
    font-family: 'SUIT', sans-serif;
    width: 100%;
    height: 100%;
    background: #fdfdfd;
    border: 1px solid #e8e8e8;
    border-radius: 4px;
    padding: 12px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .hv-vis .canvas-wrap {
    flex: 1;
    min-height: 0;
    position: relative;
  }
  .hv-vis canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: #fdfdfd;
    touch-action: none;
    cursor: grab;
  }
  .hv-vis canvas.dragging { cursor: grabbing; }

  .hv-vis .legend {
    position: absolute;
    top: 8px;
    left: 8px;
    font-size: 14.5px;
    color: #666;
    background: rgba(255, 255, 255, 0.82);
    border: 1px solid #ececec;
    border-radius: 4px;
    padding: 5px 8px;
    line-height: 1.65;
    pointer-events: none;
  }
  .hv-vis .legend .cn { color: #888; font-weight: 600; }
  .hv-vis .legend .cv { color: #2052BB; font-weight: 600; }
  .hv-vis .legend .cl { color: #e8841a; font-weight: 600; }
  .hv-vis .legend .ch { color: #2a9d4a; font-weight: 700; }
  .hv-vis .legend .ival { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }

  .hv-vis .hint {
    position: absolute;
    bottom: 6px;
    right: 8px;
    font-size: 12px;
    color: #aaa;
    background: rgba(255, 255, 255, 0.7);
    padding: 2px 6px;
    border-radius: 4px;
    pointer-events: none;
  }

  .hv-vis .controls {
    padding: 4px;
    display: grid;
    grid-template-columns: 92px 1fr 54px;
    align-items: center;
    gap: 10px 12px;
    flex-shrink: 0;
  }
  .hv-vis .label { font-size: 16.5px; color: #444; }
  .hv-vis .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16.5px;
    color: #2052BB;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .hv-vis input[type=range] {
    width: 100%;
    accent-color: #2052BB;
  }
</style>
</head>
<body>

<div class="hv-vis">
  <div class="canvas-wrap">
    <canvas id="hvCanvas"></canvas>
    <div class="legend">
      <span class="cn">N</span> 법선 · <span class="cv">V</span> 시선 · <span class="cl">L</span> 광원 · <span class="ch">H</span> 하프벡터<br>
      <span class="ival">θ<sub>v</sub>=<span id="tvVal">0</span>° · θ<sub>l</sub>=<span id="tlVal">0</span>° · θ<sub>h</sub>=<span id="thVal">0</span>°</span><br>
      <span class="ch">D(H)</span> = <span class="ival" id="dhVal">0.00</span> <span style="color:#aaa">(상대, N정렬=1)</span>
    </div>
    <div class="hint">V · L 화살표 끝을 드래그</div>
  </div>
  <div class="controls">
    <div class="label">거칠기 α</div>
    <input type="range" id="aSlider" min="5" max="100" step="1" value="35">
    <div class="value" id="aVal">0.35</div>
  </div>
</div>

<script>
/*
 * 마이크로패싯 하프벡터 기하 시각화 (2D 단면, N·V·L 평면).
 * 거친 표면은 수많은 미세 거울면(microfacet)의 모음이고, 광원 L 에서 온 빛이
 * 시선 V 로 반사되려면 그 미세면의 법선이 정확히 하프벡터 H=normalize(L+V) 와
 * 같아야 한다. NDF D(H) 는 "법선이 H 방향을 향한 미세면의 비율" = 하이라이트 세기.
 *
 * - N(위) 고정, V·L 은 반구 위에서 드래그, H 는 둘의 각이등분(green) 으로 자동.
 * - N 둘레의 초록 로브가 GGX 분포 D(m); H 가 로브를 찌르는 지점이 D(H).
 * - 원점의 회색 타일 = 실제로 반사하는 미세면(법선이 H 와 정렬).
 * 순수 Canvas 2D. 클래스 .hv-vis.
 */
(function () {
  const PI = Math.PI;
  const TWO_PI = 2 * PI;
  const DEG = 180 / PI;

  const COL_N = '#9a9a9a';
  const COL_V = '#2052BB';
  const COL_L = '#e8841a';
  const COL_H = '#2a9d4a';
  const COL_TILE = '#555';
  const COL_ARC = '#dcdcdc';
  const COL_SURF = '#888';
  const COL_LOBE_F = 'rgba(42,157,74,0.14)';
  const COL_LOBE_S = 'rgba(42,157,74,0.55)';

  const canvas = document.getElementById('hvCanvas');
  const ctx = canvas.getContext('2d');
  const aSlider = document.getElementById('aSlider');
  const aValEl = document.getElementById('aVal');
  const tvValEl = document.getElementById('tvVal');
  const tlValEl = document.getElementById('tlVal');
  const thValEl = document.getElementById('thVal');
  const dhValEl = document.getElementById('dhVal');

  // 각도는 법선 N(위)에서 잰다. +면 오른쪽, 범위 (-89°, 89°).
  let thetaV = -38 / DEG;
  let thetaL = 42 / DEG;
  let alpha = 0.35;

  let cx = 0, cy = 0, RAD = 0;

  // GGX 법선분포를 피크(θ=0)로 정규화 → [0,1] 로브.
  function normGGX(theta) {
    const a2 = alpha * alpha;
    const c = Math.cos(theta);
    const k = c * c * (a2 - 1) + 1;
    return (a2 * a2) / (k * k);
  }

  function dirPoint(theta, r) {
    return { x: cx + r * Math.sin(theta), y: cy - r * Math.cos(theta) };
  }

  function arrow(theta, r, color, width, label, labelColor) {
    const p = dirPoint(theta, r);
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    // 화살촉
    const ang = Math.atan2(p.y - cy, p.x - cx);
    const hl = 10 + width;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x - hl * Math.cos(ang - 0.4), p.y - hl * Math.sin(ang - 0.4));
    ctx.lineTo(p.x - hl * Math.cos(ang + 0.4), p.y - hl * Math.sin(ang + 0.4));
    ctx.closePath();
    ctx.fill();
    if (label) {
      ctx.fillStyle = labelColor || color;
      ctx.font = '600 15px SUIT, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const lp = dirPoint(theta, r + 16);
      ctx.fillText(label, lp.x, lp.y);
    }
  }

  function draw() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = canvas.clientWidth, h = canvas.clientHeight;
    if (w === 0 || h === 0) return;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, w, h);

    cx = w * 0.5;
    cy = h * 0.84;
    RAD = Math.min(w * 0.44, h * 0.72);
    const lobeR = RAD * 0.92;

    const thetaH = (thetaV + thetaL) / 2;

    // --- NDF 로브 D(m) (N 둘레) ---
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    const STEP = 120;
    for (let i = 0; i <= STEP; i++) {
      const th = -PI / 2 + (i / STEP) * PI;
      const r = lobeR * normGGX(th);
      const p = dirPoint(th, r);
      ctx.lineTo(p.x, p.y);
    }
    ctx.closePath();
    ctx.fillStyle = COL_LOBE_F;
    ctx.fill();
    ctx.strokeStyle = COL_LOBE_S;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // --- 반구 호 + 표면선 ---
    ctx.strokeStyle = COL_ARC;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(cx, cy, RAD, PI, TWO_PI);
    ctx.stroke();
    ctx.strokeStyle = COL_SURF;
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(cx - RAD * 1.08, cy);
    ctx.lineTo(cx + RAD * 1.08, cy);
    ctx.stroke();
    // 표면 해치
    ctx.strokeStyle = '#d8d8d8';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = cx - RAD; x <= cx + RAD; x += 11) {
      ctx.moveTo(x, cy);
      ctx.lineTo(x - 7, cy + 8);
    }
    ctx.stroke();

    // --- 미세면 타일 (법선 = H) ---
    const tileLen = RAD * 0.30;
    const tdx = Math.cos(thetaH) * tileLen;   // H 에 수직인 방향 (타일 표면)
    const tdy = Math.sin(thetaH) * tileLen;
    ctx.strokeStyle = COL_TILE;
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - tdx, cy - tdy);
    ctx.lineTo(cx + tdx, cy + tdy);
    ctx.stroke();

    // --- 로브에서 H 가 찍는 지점 ---
    const dh = normGGX(thetaH);
    const hp = dirPoint(thetaH, lobeR * dh);
    ctx.fillStyle = COL_H;
    ctx.beginPath();
    ctx.arc(hp.x, hp.y, 4.5, 0, TWO_PI);
    ctx.fill();
    // 점선: H 방향 전체
    ctx.strokeStyle = 'rgba(42,157,74,0.35)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    const hEnd = dirPoint(thetaH, lobeR);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(hEnd.x, hEnd.y);
    ctx.stroke();
    ctx.setLineDash([]);

    // --- 벡터들 ---
    arrow(0, RAD * 0.96, COL_N, 2, 'N', '#777');
    arrow(thetaH, RAD * 0.78, COL_H, 3.5, 'H', COL_H);
    arrow(thetaV, RAD * 0.96, COL_V, 2.5, 'V', COL_V);
    arrow(thetaL, RAD * 0.96, COL_L, 2.5, 'L', COL_L);

    // --- 드래그 핸들 (V·L 끝) ---
    for (const [th, col] of [[thetaV, COL_V], [thetaL, COL_L]]) {
      const p = dirPoint(th, RAD * 0.96);
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = col;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 6.5, 0, TWO_PI);
      ctx.fill();
      ctx.stroke();
    }

    // --- 읽기값 ---
    tvValEl.textContent = Math.round(thetaV * DEG);
    tlValEl.textContent = Math.round(thetaL * DEG);
    thValEl.textContent = Math.round(thetaH * DEG);
    dhValEl.textContent = dh.toFixed(2);
  }

  // --- 드래그 ---
  let active = null;   // 'V' | 'L'
  function pointerTheta(ev) {
    const rect = canvas.getBoundingClientRect();
    const px = ev.clientX - rect.left;
    const py = ev.clientY - rect.top;
    let th = Math.atan2(px - cx, cy - py);   // N 기준
    const lim = 89 / DEG;
    return Math.max(-lim, Math.min(lim, th));
  }
  function pick(ev) {
    const rect = canvas.getBoundingClientRect();
    const px = ev.clientX - rect.left;
    const py = ev.clientY - rect.top;
    const pv = dirPoint(thetaV, RAD * 0.96);
    const pl = dirPoint(thetaL, RAD * 0.96);
    const dv = Math.hypot(px - pv.x, py - pv.y);
    const dl = Math.hypot(px - pl.x, py - pl.y);
    return dv < dl ? 'V' : 'L';
  }
  canvas.addEventListener('pointerdown', (ev) => {
    active = pick(ev);
    canvas.classList.add('dragging');
    canvas.setPointerCapture(ev.pointerId);
    const th = pointerTheta(ev);
    if (active === 'V') thetaV = th; else thetaL = th;
    draw();
  });
  canvas.addEventListener('pointermove', (ev) => {
    if (!active) return;
    const th = pointerTheta(ev);
    if (active === 'V') thetaV = th; else thetaL = th;
    draw();
  });
  function endDrag() { active = null; canvas.classList.remove('dragging'); }
  canvas.addEventListener('pointerup', endDrag);
  canvas.addEventListener('pointercancel', endDrag);

  aSlider.addEventListener('input', () => {
    alpha = +aSlider.value / 100;
    aValEl.textContent = alpha.toFixed(2);
    draw();
  });

  window.addEventListener('resize', draw);
  if (window.ResizeObserver) new ResizeObserver(draw).observe(canvas);
  aValEl.textContent = alpha.toFixed(2);
  draw();
})();
</script>

</body>
</html>
