<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="pbr-vis.css">
</head>
<body>

<div class="pbr-vis">
  <div class="canvas-wrap">
    <div class="title">PBR</div>
    <canvas id="pbrCanvas"></canvas>
  </div>
  <div class="controls">
    <div class="label">Base color</div>
    <input type="color" id="bcPicker" value="#92b6ce">
    <div class="value"></div>

    <div class="label">Metallic</div>
    <input type="range" id="mSlider" min="0" max="100" value="0">
    <div class="value" id="mVal">0.00</div>

    <div class="label">Roughness</div>
    <input type="range" id="rSlider" min="1" max="100" value="50">
    <div class="value" id="rVal">0.50</div>

    <div class="label">Light θ</div>
    <input type="range" id="lSlider" min="0" max="180" value="40">
    <div class="value" id="lVal">40°</div>
  </div>
</div>

<script type="module">
/*
 * 최종 PBR: diffuse(Lambertian) + specular(Cook-Torrance) 직접광 셰이딩.
 *   F0 = mix(0.04, baseColor, metallic),  diffuseColor = baseColor·(1 - metallic)
 *   diffuse = Disney(Burley),  spec = D(GGX)·F(Schlick)·V(height-correlated Smith)
 *   최종 = (diffuse + spec)·NoL,  강도 3
 * baseColor 는 컬러피커로 조절 (sRGB→linear 변환 없이 raw 사용). 공용 씬은 ./pbr-vis.js.
 */
import { initPBRWidget, vec3 } from './pbr-vis.js';

const PI = Math.PI;

const w = initPBRWidget({
  canvas: document.getElementById('pbrCanvas'),
  uniforms: {
    uRough: { value: 0.5 },
    uMetallic: { value: 0.0 },
    uBaseColor: { value: vec3(0x92 / 255, 0xb6 / 255, 0xce / 255) },   // #92b6ce
  },
  orbitAz: 0.6,
  lightTheta: 40 * PI / 180,
  fragmentShader: `
    precision highp float;
    varying vec3 vN;
    varying vec3 vWP;
    uniform float uRough;
    uniform float uMetallic;
    uniform vec3 uBaseColor;
    uniform vec3 uLightDir;
    uniform vec3 uCamPos;
    const float PI = 3.14159265359;

    float pow5(float x) { float x2 = x * x; return x2 * x2 * x; }

    // UE Vis_SmithJoint (height-correlated, = G / (4·NoL·NoV))
    float visSmithJoint(float a2, float NoV, float NoL) {
      float vV = NoL * sqrt(NoV * (NoV - NoV * a2) + a2);
      float vL = NoV * sqrt(NoL * (NoL - NoL * a2) + a2);
      return 0.5 / (vV + vL);
    }

    // UE Diffuse_Burley (Disney)
    vec3 diffuseBurley(vec3 c, float rough, float NoV, float NoL, float VoH) {
      float FD90 = 0.5 + 2.0 * VoH * VoH * rough;
      float FdV = 1.0 + (FD90 - 1.0) * pow5(1.0 - NoV);
      float FdL = 1.0 + (FD90 - 1.0) * pow5(1.0 - NoL);
      return c * ((1.0 / PI) * FdV * FdL);
    }

    void main() {
      vec3 N = normalize(vN);
      vec3 V = normalize(uCamPos - vWP);
      vec3 L = normalize(uLightDir);
      vec3 H = normalize(L + V);

      float NoH = max(dot(N, H), 0.0);
      float NoV = max(dot(N, V), 0.0);
      float NoL = max(dot(N, L), 0.0);
      float VoH = max(dot(V, H), 0.0);

      float a  = uRough * uRough;   // α = roughness²
      float a2 = a * a;             // α²

      vec3 F0 = mix(vec3(0.04), uBaseColor, uMetallic);
      vec3 diffuseColor = uBaseColor * (1.0 - uMetallic);

      // specular: D·F·V
      float d = NoH * NoH * (a2 - 1.0) + 1.0;
      float D = a2 / (PI * d * d);
      vec3  F = F0 + (vec3(1.0) - F0) * pow(1.0 - VoH, 5.0);
      float Vis = visSmithJoint(a2, NoV, NoL);
      vec3 spec = D * F * Vis;

      // diffuse: Disney (Burley)
      vec3 diff = diffuseBurley(diffuseColor, uRough, NoV, NoL, VoH);

      vec3 col = NoL > 0.0 ? (diff + spec) * NoL * 3.0 : vec3(0.0);
      gl_FragColor = vec4(col, 1.0);
    }
  `,
});

// ---- 컨트롤 ----
const rSlider = document.getElementById('rSlider');
const rValEl = document.getElementById('rVal');
const mSlider = document.getElementById('mSlider');
const mValEl = document.getElementById('mVal');
const lSlider = document.getElementById('lSlider');
const lValEl = document.getElementById('lVal');
const bcPicker = document.getElementById('bcPicker');

rSlider.addEventListener('input', () => {
  const roughness = +rSlider.value / 100;
  rValEl.textContent = roughness.toFixed(2);
  w.sphereMat.uniforms.uRough.value = roughness;
  w.requestDraw();
});
mSlider.addEventListener('input', () => {
  const metallic = +mSlider.value / 100;
  mValEl.textContent = metallic.toFixed(2);
  w.sphereMat.uniforms.uMetallic.value = metallic;
  w.requestDraw();
});
lSlider.addEventListener('input', () => {
  lValEl.textContent = lSlider.value + '°';
  w.setLightTheta(+lSlider.value * PI / 180);
});
bcPicker.addEventListener('input', () => {
  const hex = bcPicker.value;   // #rrggbb
  const r = parseInt(hex.slice(1, 3), 16) / 255;
  const g = parseInt(hex.slice(3, 5), 16) / 255;
  const b = parseInt(hex.slice(5, 7), 16) / 255;
  w.sphereMat.uniforms.uBaseColor.value.set(r, g, b);
  w.requestDraw();
});
</script>

</body>
</html>
